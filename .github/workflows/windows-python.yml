name: Windows Python

on:
  push:
    paths:
      - "apps/windows/**"
      - "config/**"
      - "protocol/schemas/**"
      - "tests/**"
      - ".github/workflows/windows-python.yml"
  pull_request:
    paths:
      - "apps/windows/**"
      - "config/**"
      - "protocol/schemas/**"
      - "tests/**"
      - ".github/workflows/windows-python.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows:
    name: Python ${{ matrix.python-version }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: apps/windows/pyproject.toml

      - name: Install package and development tools
        working-directory: apps/windows
        run: python -m pip install --upgrade pip; python -m pip install ".[dev]"

      - name: Lint
        working-directory: apps/windows
        run: python -m ruff check src ../../tests

      - name: Unit tests
        working-directory: apps/windows
        env:
          YANCUO_DATA_ROOT: ${{ runner.temp }}\yancuo-test-data
          YANCUO_CONFIG_FILE: ${{ github.workspace }}\config\default.toml
        run: python -m pytest

      - name: Build wheel
        working-directory: apps/windows
        run: |
          if (Test-Path src/yancuo_win.egg-info) { Remove-Item -LiteralPath src/yancuo_win.egg-info -Recurse -Force }
          python -m pip wheel --no-deps . --wheel-dir dist

      - name: Smoke test installed wheel resources
        working-directory: apps/windows
        env:
          WHEEL_SMOKE_ROOT: ${{ runner.temp }}\yancuo-wheel-smoke-${{ matrix.python-version }}
        run: |
          if (Test-Path $env:WHEEL_SMOKE_ROOT) { Remove-Item -LiteralPath $env:WHEEL_SMOKE_ROOT -Recurse -Force }
          New-Item -ItemType Directory -Path $env:WHEEL_SMOKE_ROOT | Out-Null
          $wheel = Get-ChildItem -LiteralPath dist -Filter *.whl | Select-Object -First 1
          python -m pip install --no-deps --target $env:WHEEL_SMOKE_ROOT $wheel.FullName
          $env:PYTHONPATH = $env:WHEEL_SMOKE_ROOT
          python -c "import yancuo_win; from yancuo_win.config.settings import default_toml_path, load_settings; from yancuo_win.import_export.workspace import WorkspaceService; p=default_toml_path(); assert p.is_file(), p; assert 'resources' in str(p), p; assert load_settings(p).application.schema_version == 4; print(yancuo_win.__file__); print(p)"
